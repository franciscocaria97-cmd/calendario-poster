<script type="text/babel">
const { useState, useEffect, useRef } = React;

const SUPA_URL = "https://tzywtsxgfgmcglamyuar.supabase.co";
const SUPA_KEY = "sb_publishable_3TZrHDWcuOhlmjyLPaaIgA_PuO7Opxd";

async function supa(path, opts) {
  if (!opts) opts = {};
  var res = await fetch(SUPA_URL + "/rest/v1/" + path, {
    headers: { apikey: SUPA_KEY, Authorization: "Bearer " + SUPA_KEY, "Content-Type": "application/json", Prefer: opts.prefer || "return=representation" },
    method: opts.method || "GET",
    body: opts.body || undefined,
  });
  if (!res.ok) throw new Error(await res.text());
  var text = await res.text();
  return text ? JSON.parse(text) : [];
}
var db = {
  get:    function(t,q)    { return supa(t+"?"+(q||"")); },
  insert: function(t,b)    { return supa(t,{method:"POST",body:JSON.stringify(b)}); },
  update: function(t,q,b)  { return supa(t+"?"+q,{method:"PATCH",body:JSON.stringify(b)}); },
  delete: function(t,q)    { return supa(t+"?"+q,{method:"DELETE",prefer:"return=minimal"}); },
};

// Caché global en memoria
var CACHE = {};
function cGet(k)      { return CACHE[k]||null; }
function cSet(k,v)    { CACHE[k]=v; }
function cDel(prefix) { Object.keys(CACHE).forEach(function(k){ if(k.indexOf(prefix)===0) delete CACHE[k]; }); }

var MONTHS     = ["Enero","Febrero","Marzo","Abril","Mayo","Junio","Julio","Agosto","Septiembre","Octubre","Noviembre","Diciembre"];
var DAYS_SHORT = ["Dom","Lun","Mar","Mie","Jue","Vie","Sab"];
var BLUE  = {main:"#1a3a6b",light:"#e8f0ff",soft:"#f0f4ff",hover:"#EEF2FF"};
var GREEN = {main:"#6a9c1f",light:"#edf5d0",soft:"#f4fae8",hover:"#EDF7D0"};

var AFIP_CATS = [
  {label:"Moratoria",                color:"#E8A838",light:"#FEF3D7"},
  {label:"CCSS",                     color:"#5B8DEF",light:"#E8F0FF"},
  {label:"IVA",                      color:"#E85B5B",light:"#FDE8E8"},
  {label:"IIBB",                     color:"#9B59B6",light:"#F3E8FD"},
  {label:"Anticipos Ganancias",      color:"#27AE60",light:"#E4F9ED"},
  {label:"Impuesto a las Ganancias", color:"#16A085",light:"#E0F5F1"},
  {label:"Tasas Municipales",        color:"#D35400",light:"#FDEBD0"},
  {label:"Retencion de Dividendos",  color:"#2C3E50",light:"#E8ECF0"},
  {label:"Otro",                     color:"#95A5A6",light:"#F2F3F4"},
];

function getCat(label) {
  var f = AFIP_CATS.filter(function(c){ return c.label===label; });
  return f.length>0 ? f[0] : AFIP_CATS[AFIP_CATS.length-1];
}
function daysInMonth(y,m) { return new Date(y,m+1,0).getDate(); }
function firstDay(y,m)    { return new Date(y,m,1).getDay(); }
function fmt(n) { return new Intl.NumberFormat("es-AR",{style:"currency",currency:"ARS",minimumFractionDigits:2,maximumFractionDigits:2}).format(n||0); }

function Spinner(p) {
  var c=p.color||"#1a3a6b";
  return <div style={{width:22,height:22,border:"3px solid "+c+"25",borderTop:"3px solid "+c,borderRadius:"50%",animation:"spin 0.7s linear infinite",flexShrink:0}}/>;
}

function PosterLogo(p) {

  return (

}

// ── Login ──
function LoginScreen(props) {
  var [user,setUser]=useState(""), [pass,setPass]=useState(""), [error,setError]=useState(false), [shake,setShake]=useState(false);
  function go() {
    var u = user.replace(/\s/g,"").toLowerCase();
    if(u==="poster"&&pass==="123") props.onLogin();
    else { setError(true); setShake(true); setTimeout(function(){ setShake(false); },500); }
  }
  return (
    <div style={{minHeight:"100vh",background:"#F4F6FB",display:"flex",alignItems:"center",justifyContent:"center",padding:16}}>
      <div className={"fade-in"+(shake?" shake":"")} style={{background:"#fff",borderRadius:24,padding:"44px 38px",width:"100%",maxWidth:380,boxShadow:"0 8px 40px #00000010"}}>

          <input value={user} onChange={function(e){setUser(e.target.value.replace(/\s/g,""));setError(false);}} onKeyDown={function(e){if(e.key==="Enter")go();}}
            placeholder="Usuario" style={{width:"100%",padding:"12px 14px",borderRadius:12,border:"1.5px solid "+(error?"#E85B5B":"#E5E9F0"),fontSize:14,fontWeight:600}}/>
          <input value={pass} type="password" onChange={function(e){setPass(e.target.value);setError(false);}} onKeyDown={function(e){if(e.key==="Enter")go();}}
            placeholder="Contrasena" style={{width:"100%",padding:"12px 14px",borderRadius:12,border:"1.5px solid "+(error?"#E85B5B":"#E5E9F0"),fontSize:14,fontWeight:600}}/>

}

// ── Welcome Popup ──
function WelcomePopup(props) {
  var now=new Date(), today=now.getDate(), mk=now.getFullYear()+"-"+now.getMonth();
  var [pays,setPays]=useState([]), [loading,setLoading]=useState(true);
  useEffect(function(){
    (async function(){
      try {
        var [afip,prov]=await Promise.all([
          db.get("afip_payments","month_key=eq."+mk+"&day=eq."+today+"&paid=eq.false"),
          db.get("prov_payments","month_key=eq."+mk+"&day=eq."+today+"&paid=eq.false"),
        ]);
        var afipRaw = afip;
        // Consolidar moratorias en una sola línea
        var moratorias = afipRaw.filter(function(p){ return p.category==="Moratoria"||p.is_moratoria_plan; });
        var otros = afipRaw.filter(function(p){ return p.category!=="Moratoria"&&!p.is_moratoria_plan; });
        var consolidated = otros;
        if(moratorias.length>0){
          var morTotal = moratorias.reduce(function(s,p){ return s+(p.amount||0); },0);
          var morPaid = moratorias.every(function(p){ return p.paid; });
          consolidated = [{id:"mor",name:"Moratoria",category:"Moratoria",amount:morTotal,paid:morPaid}].concat(otros);
        }
        setPays(consolidated.concat(prov.map(function(p){ return Object.assign({},p,{name:p.supplier,category:"Proveedor"}); })));
      } catch(e){}
      setLoading(false);
    })();
  },[]);
  return (
    <div style={{position:"fixed",inset:0,background:"#00000060",display:"flex",alignItems:"center",justifyContent:"center",zIndex:300,padding:16,backdropFilter:"blur(6px)"}}>
      <div className="fade-in" style={{background:"#fff",borderRadius:24,padding:32,width:"100%",maxWidth:400,boxShadow:"0 30px 80px #0003",textAlign:"center"}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"center",gap:8,marginBottom:14}}>
          <svg width="18" height="18" viewBox="0 0 44 44" fill="none"><ellipse cx="30" cy="28" rx="12" ry="7" fill="#8fac2e"/><path d="M6 34 Q8 18 26 10" stroke="#1a3a6b" strokeWidth="5" strokeLinecap="round" fill="none"/><path d="M2 38 Q4 14 28 4" stroke="#1a3a6b" strokeWidth="3.5" strokeLinecap="round" fill="none" opacity="0.4"/></svg>
          <span style={{fontFamily:"Arial Black,sans-serif",fontWeight:900,fontSize:16,color:"#1a3a6b"}}>POSTER</span>
        </div>
        <div style={{fontSize:28,marginBottom:8}}>{loading?"⏳":pays.length>0?"📋":"✅"}</div>
        <h2 style={{fontFamily:"'Fraunces',serif",fontWeight:800,fontSize:22,color:"#1A1D2E",marginBottom:4}}>Buen dia, Marisa!</h2>
        <p style={{fontSize:13,color:"#8892A4",fontWeight:600,marginBottom:18}}>{now.toLocaleDateString("es-AR",{weekday:"long",day:"numeric",month:"long"})}</p>
        {loading ? <div style={{display:"flex",justifyContent:"center",padding:16}}><Spinner color={BLUE.main}/></div>
          : pays.length===0 ? <p style={{fontSize:14,fontWeight:600,color:"#27AE60",padding:"12px 0",background:"#E4F9ED",borderRadius:12,marginBottom:8}}>No hay ningun pago pendiente para hoy.</p>
          : (
            <div style={{textAlign:"left",marginBottom:8}}>
              <p style={{fontSize:11,fontWeight:800,color:"#8892A4",marginBottom:10,textTransform:"uppercase",letterSpacing:0.5}}>Pagos pendientes hoy</p>
              <div style={{display:"flex",flexDirection:"column",gap:7,maxHeight:200,overflowY:"auto"}}>
                {pays.map(function(p,i){
                  var cat=getCat(p.category);
                  return (
                    <div key={i} style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"10px 14px",borderRadius:10,background:cat.light}}>
                      <span style={{fontSize:14,fontWeight:700,color:"#1A1D2E"}}>{p.name}</span>
                      <span style={{fontSize:14,fontWeight:900,color:"#1A1D2E"}}>{fmt(p.amount)}</span>
                    </div>
                  );
                })}
              </div>
            </div>
          )
        }
        <button onClick={props.onClose} style={{marginTop:14,width:"100%",padding:"13px 0",borderRadius:12,background:BLUE.main,color:"#fff",fontWeight:900,fontSize:15}}>Entrar</button>
      </div>
    </div>
  );
}

// ── Comprobante Modal ──
function ComprobanteModal(props) {
  var [url,setUrl]=useState(null), [name,setName]=useState(""), [uploading,setUploading]=useState(false), [err,setErr]=useState("");
  async function upload(file) {
    setUploading(true);
    try {
      var ext=file.name.split(".").pop();
      var path="comprobantes/"+Date.now()+"-"+Math.random().toString(36).slice(2)+"."+ext;
      var res=await fetch(SUPA_URL+"/storage/v1/object/Facturas/"+path,{method:"POST",headers:{apikey:SUPA_KEY,Authorization:"Bearer "+SUPA_KEY,"Content-Type":file.type,"x-upsert":"true"},body:file});
      if(!res.ok) throw new Error();
      setUrl(SUPA_URL+"/storage/v1/object/public/Facturas/"+path); setName(file.name); setErr("");
    } catch(e){ setErr("Error al subir. Intenta de nuevo."); }
    setUploading(false);
  }
  return (
    <div style={{position:"fixed",inset:0,background:"#00000055",display:"flex",alignItems:"center",justifyContent:"center",zIndex:300,padding:16,backdropFilter:"blur(4px)"}}>
      <div className="fade-in" style={{background:"#fff",borderRadius:22,padding:28,width:"100%",maxWidth:380,boxShadow:"0 30px 80px #0003"}}>
        <h2 style={{fontFamily:"'Fraunces',serif",fontWeight:800,fontSize:19,color:"#1A1D2E",marginBottom:6}}>Comprobante de pago</h2>
        <p style={{fontSize:13,color:"#8892A4",fontWeight:600,marginBottom:18}}>Adjunta el comprobante para confirmar.</p>
        <label style={{width:"100%",padding:"14px",borderRadius:11,border:"2px dashed "+GREEN.main+"60",background:GREEN.soft,color:GREEN.main,fontWeight:700,fontSize:13,display:"flex",alignItems:"center",justifyContent:"center",gap:8,cursor:"pointer",marginBottom:10}}>
          {uploading?<Spinner color={GREEN.main}/>:<span>{name||"Subir archivo (PDF o imagen)"}</span>}
          <input type="file" accept=".pdf,image/*" onChange={function(e){ if(e.target.files[0]) upload(e.target.files[0]); }} style={{display:"none"}}/>
        </label>
        {url&&<p style={{fontSize:12,color:"#27AE60",fontWeight:700,marginBottom:6}}>✓ {name}</p>}
        {err&&<p style={{fontSize:12,color:"#E85B5B",fontWeight:700,marginBottom:6}}>{err}</p>}
        <div style={{display:"flex",gap:10,marginTop:8}}>
          <button onClick={props.onClose} style={{flex:1,padding:"11px 0",borderRadius:11,background:"#F4F6FB",color:"#4A5568",fontWeight:800,fontSize:14}}>Cancelar</button>
          <button onClick={function(){ if(!url){setErr("Debes subir el comprobante primero.");return;} props.onConfirm(url); }}
            style={{flex:2,padding:"11px 0",borderRadius:11,background:url?GREEN.main:"#CDD0DA",color:"#fff",fontWeight:900,fontSize:14}}>
            Confirmar pago
          </button>
        </div>
      </div>
    </div>
  );
}

// ── AFIP ──
function AfipCalendar() {
  var now=new Date();
  var [year,setYear]=useState(now.getFullYear()), [month,setMonth]=useState(now.getMonth());
  var [payments,setPayments]=useState([]), [recurring,setRecurring]=useState([]);
  var [subTab,setSubTab]=useState("calendar");
  var [modal,setModal]=useState(null), [dayModal,setDayModal]=useState(null);
  var [form,setForm]=useState({name:"",amount:"",category:"IVA",recurring:false});
  var [loading,setLoading]=useState(true), [saving,setSaving]=useState(false);
  var [metodoPagoModal,setMetodoPagoModal]=useState(null);
  var [pwDeleteModal,setPwDeleteModal]=useState(null);
  var mk=year+"-"+month;

  async function loadData() {
    var ck="afip:"+mk, cached=cGet(ck);
    if(cached){ setPayments(cached.p); setRecurring(cached.r); setLoading(false); return; }
    setLoading(true);
    try {
      var [pays,recs,plans]=await Promise.all([
        db.get("afip_payments","month_key=eq."+mk+"&order=day.asc"),
        db.get("afip_recurring","order=day.asc"),
        db.get("moratoria_plans","order=plan.asc"),
      ]);
      // Auto-populate recurring
      var existIds=pays.map(function(p){ return p.recur_id; }).filter(Boolean);
      var toAdd=recs.filter(function(r){ return !existIds.includes(r.id); });
      if(toAdd.length>0){
        var ins=await db.insert("afip_payments",toAdd.map(function(r){ return {month_key:mk,day:r.day,name:r.name,amount:r.amount,category:r.category,paid:false,recur_id:r.id}; }));
        if(Array.isArray(ins)) pays=pays.concat(ins);
      }
      // Moratoria unificada — consolidar todos los planes en UNO
      var morTotal=plans.reduce(function(s,p){ return s+(p.amount||0); },0);
      var existMor=pays.filter(function(p){ return p.is_moratoria_plan; });
      // Si hay más de 1 entrada de moratoria (planes viejos), eliminar duplicados y dejar solo una
      if(existMor.length>1){

        for(var di=0;di<toDelete.length;di++){ try{ await db.delete("afip_payments","id=eq."+toDelete[di].id); }catch(e){} }
        pays=pays.filter(function(p){ return !toDelete.find(function(d){ return d.id===p.id; }); });
        existMor=[existMor[0]];

      if(existMor.length===0 && (plans.length>0||morTotal>0)){
        var insMor=await db.insert("afip_payments",{month_key:mk,day:16,name:"Moratoria",amount:morTotal,category:"Moratoria",paid:false,is_moratoria_plan:true});
        pays=pays.concat(Array.isArray(insMor)?insMor:[insMor]);

        pays=pays.map(function(p){ return p.id===existMor[0].id?Object.assign({},p,{name:"Moratoria",amount:morTotal}):p; });
      }
      pays.sort(function(a,b){ return a.day-b.day; });
      cSet(ck,{p:pays,r:recs}); setPayments(pays); setRecurring(recs);
    } catch(e){ console.error(e); }
    setLoading(false);
  }

    var ck="prov:"+mk, cs="sups";
    var cp=cGet(ck), csups=cGet(cs);
    if(cp&&csups){ setPayments(cp); setSuppliers(csups); setLoading(false); return; }
    setLoading(true);
    try {
      var [pays,sups]=await Promise.all([
        cp?Promise.resolve(cp):db.get("prov_payments","month_key=eq."+mk+"&order=day.asc"),
        csups?Promise.resolve(csups):db.get("prov_suppliers","order=name.asc"),
      ]);
      cSet(ck,pays); cSet(cs,sups); setPayments(pays); setSuppliers(sups);
    } catch(e){ console.error(e); }
    setLoading(false);
  }

  useEffect(function(){ loadData(); },[mk]);

  async function uploadFile(file) {
    setUploading(true);
    try {
      var ext=file.name.split(".").pop();
      var path=Date.now()+"-"+Math.random().toString(36).slice(2)+"."+ext;
      var res=await fetch(SUPA_URL+"/storage/v1/object/Facturas/"+path,{method:"POST",headers:{apikey:SUPA_KEY,Authorization:"Bearer "+SUPA_KEY,"Content-Type":file.type,"x-upsert":"true"},body:file});
      if(!res.ok) throw new Error();
      var url=SUPA_URL+"/storage/v1/object/public/Facturas/"+path;
      setForm(function(f){ return Object.assign({},f,{fileUrl:url,fileName:file.name}); });
    } catch(e){ alert("Error al subir el archivo."); }
    setUploading(false);
  }

  async function savePayment() {
    if(!form.supplier.trim()||!form.amount) return;
    var amt=parseFloat(String(form.amount).replace(/[^0-9.]/g,""));
    if(isNaN(amt)) return;
    setSaving(true);
    try {
      if(modal.editId){
        var upd={supplier:form.supplier,amount:amt};
        if(form.fileUrl) upd.file_url=form.fileUrl;
        await db.update("prov_payments","id=eq."+modal.editId,upd);
      } else {
        await db.insert("prov_payments",{month_key:mk,day:modal.day,supplier:form.supplier,amount:amt,paid:false,file_url:form.fileUrl||null});
        if(!suppliers.find(function(s){ return s&&s.name===form.supplier.trim(); })){
          await db.insert("prov_suppliers",{name:form.supplier.trim()}); cDel("sups");
        }
      }
      cDel("prov:"+mk); await loadData();
    } catch(e){ console.error(e); }
    setSaving(false); setModal(null);

          </button>
          {loading?<div style={{display:"flex",justifyContent:"center",padding:50}}><Spinner color={GREEN.main}/></div>:
            payments.length===0?<div style={{background:"#fff",borderRadius:14,padding:32,textAlign:"center",boxShadow:"0 1px 3px #0001"}}><p style={{fontSize:15,color:"#8892A4",fontWeight:600}}>No hay pagos este mes.</p></div>:(
              <div style={{display:"flex",flexDirection:"column",gap:8}}>
                {payments.sort(function(a,b){ return a.day-b.day; }).map(function(p){
                  return (
                    <div key={p.id} style={{background:"#fff",borderRadius:12,padding:"14px 18px",boxShadow:"0 1px 3px #0001",display:"flex",alignItems:"center",gap:14,opacity:p.paid?0.75:1}}>
                      <div style={{width:42,height:42,borderRadius:10,background:p.paid?"#F4F6FB":GREEN.light,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",flexShrink:0}}>
                        <span style={{fontSize:8,fontWeight:700,color:"#8892A4",textTransform:"uppercase"}}>Dia</span>
                        <span style={{fontSize:18,fontWeight:900,color:p.paid?"#8892A4":GREEN.main,lineHeight:1}}>{p.day}</span>
                      </div>
                      <div style={{flex:1,minWidth:0}}>
                        <p style={{fontWeight:800,fontSize:15,color:"#1A1D2E",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{p.supplier}</p>
                        <p style={{fontSize:14,fontWeight:700,color:p.paid?"#8892A4":"#1A1D2E"}}>{fmt(p.amount)}</p>
                      </div>
                      <div style={{display:"flex",alignItems:"center",gap:8,flexShrink:0}}>
                        {p.paid?(
                          <span style={{fontSize:12,fontWeight:700,color:"#27AE60",background:"#E4F9ED",padding:"5px 11px",borderRadius:20}}>Pagado</span>
                        ):(
                          <button onClick={function(e){ togglePaid(p.id,false,e); }} style={{padding:"7px 14px",borderRadius:9,background:GREEN.main,color:"#fff",fontWeight:700,fontSize:13}}>Marcar pagado</button>
                        )}
                        {(p.file_url||p.comprobante_url)&&(
                          <button onClick={function(){ window.open(p.file_url||p.comprobante_url,"_blank"); }}
                            style={{padding:"6px 12px",borderRadius:9,background:"#F4F6FB",color:"#4A5568",fontWeight:700,fontSize:12,border:"1.5px solid #E5E9F0"}}>
                            Ver factura
                          </button>
                        )}
                        <button onClick={function(){ setForm({supplier:p.supplier,amount:String(p.amount),fileUrl:null,fileName:p.file_url?p.file_url.split("/").pop():""}); setModal({day:p.day,editId:p.id,paid:p.paid,fileUrl:p.file_url}); }}
                          style={{width:32,height:32,borderRadius:8,background:"#F4F6FB",color:"#8892A4",display:"flex",alignItems:"center",justifyContent:"center",fontSize:15}}>&#9998;</button>
                      </div>
                    </div>
                  );
                })}
              </div>
            )
          }
        </div>
      )}

      {/* Calendario */}
      {subTab==="calendario"&&(<>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",background:"#fff",borderRadius:14,padding:"13px 20px",marginBottom:12,boxShadow:"0 1px 3px #0001"}}>
          <button onClick={function(){ if(month===0){setMonth(11);setYear(function(y){return y-1;});}else setMonth(function(m){return m-1;}); }} style={{width:38,height:38,borderRadius:10,background:GREEN.light,color:GREEN.main,fontSize:20,display:"flex",alignItems:"center",justifyContent:"center",fontWeight:800}}>&#8249;</button>
          <span style={{fontFamily:"'Fraunces',serif",fontWeight:800,fontSize:21,color:"#1A1D2E"}}>{MONTHS[month]} {year}</span>
          <button onClick={function(){ if(month===11){setMonth(0);setYear(function(y){return y+1;});}else setMonth(function(m){return m+1;}); }} style={{width:38,height:38,borderRadius:10,background:GREEN.light,color:GREEN.main,fontSize:20,display:"flex",alignItems:"center",justifyContent:"center",fontWeight:800}}>&#8250;</button>
        </div>
        {loading?<div style={{display:"flex",justifyContent:"center",padding:60}}><Spinner color={GREEN.main}/></div>:(
          <div style={{background:"#fff",borderRadius:14,overflow:"hidden",boxShadow:"0 1px 3px #0001"}}>
            <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",background:"#F4F6FB"}}>
              {DAYS_SHORT.map(function(d){ return <div key={d} style={{textAlign:"center",padding:"10px 4px",fontSize:11,fontWeight:800,color:"#8892A4",textTransform:"uppercase"}}>{d}</div>; })}
            </div>
            <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gridAutoRows:"120px"}}>
              {grid.map(function(day,i){
                if(!day) return <div key={"e"+i} style={{borderRight:"1px solid #F0F2F8",borderBottom:"1px solid #F0F2F8",background:"#FAFBFC"}}/>;
                var dp=byDay[day]||[], isToday=isCurr&&day===today;
                return (
                  <div key={day} onClick={function(){ setForm({supplier:"",amount:"",fileUrl:null,fileName:""}); setModal({day:day}); }}
                    style={{borderRight:"1px solid #F0F2F8",borderBottom:"1px solid #F0F2F8",padding:"5px",cursor:"pointer",background:isToday?GREEN.soft:"#fff"}}
                    onMouseEnter={function(e){ e.currentTarget.style.background=isToday?GREEN.soft:GREEN.hover; }}
                    onMouseLeave={function(e){ e.currentTarget.style.background=isToday?GREEN.soft:"#fff"; }}>
                    <span style={{width:22,height:22,borderRadius:"50%",fontSize:11,fontWeight:800,background:isToday?GREEN.main:"transparent",color:isToday?"#fff":"#1A1D2E",display:"flex",alignItems:"center",justifyContent:"center",marginBottom:2}}>{day}</span>
                    <div style={{display:"flex",flexDirection:"column",gap:2}}>
                      {dp.map(function(p){
                        return (
                          <div key={p.id} onClick={function(e){ e.stopPropagation(); setForm({supplier:p.supplier,amount:String(p.amount),fileUrl:null,fileName:p.file_url?p.file_url.split("/").pop():""}); setModal({day:p.day,editId:p.id,paid:p.paid,fileUrl:p.file_url}); }}
                            style={{background:p.paid?"#F4F6FB":GREEN.light,borderLeft:"2px solid "+(p.paid?"#D0D5E0":GREEN.main),borderRadius:"0 4px 4px 0",padding:"2px 4px",opacity:p.paid?0.6:1}}>
                            <span style={{fontSize:9,fontWeight:800,color:p.paid?"#8892A4":GREEN.main,display:"block",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",maxWidth:68}}>{p.supplier}</span>
                            <span style={{fontSize:9,fontWeight:700,color:p.paid?"#8892A4":"#1A1D2E",display:"block"}}>{fmt(p.amount)}</span>
                          </div>
                        );
                      })}
                    </div>
                  </div>
                );
              })}
            </div>
          </div>
        )}
      </>)}

      {/* Proveedores */}
      {subTab==="proveedores"&&(
        <div style={{background:"#fff",borderRadius:14,padding:22,boxShadow:"0 1px 3px #0001"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
            <h2 style={{fontFamily:"'Fraunces',serif",fontWeight:800,fontSize:17,color:"#1A1D2E"}}>Proveedores</h2>
            <button onClick={function(){ setModal({isNewSup:true}); }} style={{padding:"9px 16px",borderRadius:10,background:GREEN.main,color:"#fff",fontWeight:700,fontSize:13}}>+ Nuevo</button>
          </div>
          {suppliers.length===0?<p style={{fontSize:14,color:"#8892A4",textAlign:"center",padding:"30px 0"}}>Sin proveedores aun.</p>:(
            <div style={{display:"flex",flexDirection:"column",gap:8}}>
              {suppliers.filter(function(s){ return s&&s.name; }).map(function(s){
                return (
                  <div key={s.id} style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"13px 16px",borderRadius:12,background:GREEN.light,border:"1.5px solid "+GREEN.main+"20"}}>
                    <div style={{display:"flex",alignItems:"center",gap:12}}>
                      <div style={{width:36,height:36,borderRadius:10,background:GREEN.main,display:"flex",alignItems:"center",justifyContent:"center",color:"#fff",fontWeight:900,fontSize:14}}>{s.name[0]}</div>
                      <div>
                        <p style={{fontWeight:700,fontSize:14,color:"#1A1D2E"}}>{s.name}</p>
                        {s.alias&&<p style={{fontSize:12,color:"#8892A4"}}>{s.alias}</p>}
                        {s.cbu&&<p style={{fontSize:11,color:"#8892A4"}}>CBU: {s.cbu}</p>}
                      </div>
                    </div>
                    <button onClick={function(){ if(window.confirm("Eliminar a "+s.name+"?")){ db.delete("prov_suppliers","id=eq."+s.id).then(function(){ cDel("sups"); loadData(); }); }}}
                      style={{width:30,height:30,borderRadius:8,background:"#FFE8E8",color:"#E85B5B",fontWeight:900,fontSize:15,display:"flex",alignItems:"center",justifyContent:"center"}}>&#215;</button>
                  </div>
                );
              })}
            </div>
          )}
        </div>
      )}

      {comprobanteModal&&<ComprobanteModal onClose={function(){ setComprobanteModal(null); }} onConfirm={async function(url){ await db.update("prov_payments","id=eq."+comprobanteModal.id,{paid:true,comprobante_url:url}); var up=payments.map(function(p){ return p.id===comprobanteModal.id?Object.assign({},p,{paid:true,comprobante_url:url}):p; }); cSet("prov:"+mk,up); setPayments(up); setComprobanteModal(null); }}/>}

      {pwDeleteModal&&<PasswordConfirmModal onClose={function(){ setPwDeleteModal(null); }} onConfirm={function(){ deletePay(pwDeleteModal); setPwDeleteModal(null); setModal(null); }}/>}

      {modal&&modal.isNewSup&&<NuevoProveedorModal onClose={function(){ setModal(null); }} onSave={async function(data){ await db.insert("prov_suppliers",data); cDel("sups"); await loadData(); setModal(null); }}/>}

      {modal&&!modal.isNewSup&&(
        <div onClick={function(){ setModal(null); }} style={{position:"fixed",inset:0,background:"#00000055",display:"flex",alignItems:"center",justifyContent:"center",zIndex:200,padding:16,backdropFilter:"blur(4px)"}}>
          <div onClick={function(e){ e.stopPropagation(); }} className="fade-in" style={{background:"#fff",borderRadius:22,padding:28,width:"100%",maxWidth:400,boxShadow:"0 30px 80px #0003",maxHeight:"90vh",overflowY:"auto"}}>
            <h2 style={{fontFamily:"'Fraunces',serif",fontWeight:800,fontSize:19,color:"#1A1D2E",marginBottom:18}}>{modal.editId?"Modificar — "+MONTHS[month]+" dia "+modal.day:"Nuevo pago — "+MONTHS[month]+" "+modal.day}</h2>
            <div style={{display:"flex",flexDirection:"column",gap:12}}>
              <div>
                <label style={{fontSize:11,fontWeight:800,color:"#8892A4",display:"block",marginBottom:5,textTransform:"uppercase"}}>Proveedor</label>
                {suppliers.length>0?(
                  <select value={form.supplier} onChange={function(e){ var v=e.target.value; setForm(function(f){ return Object.assign({},f,{supplier:v}); }); }} style={{width:"100%",padding:"11px 14px",borderRadius:11,border:"1.5px solid "+GREEN.light,fontSize:14,background:"#fff",fontWeight:600}}>
                    <option value="">Selecciona un proveedor</option>
                    {suppliers.filter(function(s){return s&&s.name;}).map(function(s){ return <option key={s.id} value={s.name}>{s.name}</option>; })}
                  </select>
                ):(
                  <input value={form.supplier} onChange={function(e){ var v=e.target.value; setForm(function(f){ return Object.assign({},f,{supplier:v}); }); }} placeholder="Nombre del proveedor" style={{width:"100%",padding:"11px 14px",borderRadius:11,border:"1.5px solid "+GREEN.light,fontSize:14,fontWeight:600}}/>
                )}
              </div>
              <div>
                <label style={{fontSize:11,fontWeight:800,color:"#8892A4",display:"block",marginBottom:5,textTransform:"uppercase"}}>Monto</label>
                <input value={form.amount} onChange={function(e){ var v=e.target.value; setForm(function(f){ return Object.assign({},f,{amount:v}); }); }} placeholder="0" type="number" style={{width:"100%",padding:"11px 14px",borderRadius:11,border:"1.5px solid "+GREEN.light,fontSize:14,fontWeight:600}}/>
              </div>
              <div>
                <label style={{fontSize:11,fontWeight:800,color:"#8892A4",display:"block",marginBottom:5,textTransform:"uppercase"}}>Factura (opcional)</label>
                <label style={{width:"100%",padding:"11px 14px",borderRadius:11,border:"2px dashed "+GREEN.main+"60",background:GREEN.soft,color:GREEN.main,fontWeight:700,fontSize:13,display:"flex",alignItems:"center",justifyContent:"center",gap:8,cursor:"pointer"}}>
                  {uploading?<Spinner color={GREEN.main}/>:<span>{form.fileName||"Subir factura"}</span>}
                  <input type="file" accept=".pdf,image/*" onChange={function(e){ if(e.target.files[0]) uploadFile(e.target.files[0]); }} style={{display:"none"}}/>
                </label>
              </div>
              {modal.editId&&(
                <button onClick={function(){
                  if(!modal.paid){ setComprobanteModal({id:modal.editId}); setModal(null); }
                  else{ db.update("prov_payments","id=eq."+modal.editId,{paid:false}).then(function(){ cDel("prov:"+mk); loadData(); setModal(null); }); }
                }} style={{padding:"10px 14px",borderRadius:11,background:modal.paid?"#FFF8E1":"#E8F5E9",color:modal.paid?"#E8A838":"#27AE60",fontWeight:800,fontSize:13,textAlign:"left"}}>
                  {modal.paid?"Marcar como pendiente":"Marcar como pagado"}
                </button>
              )}
            </div>
            <div style={{display:"flex",gap:10,marginTop:20}}>
              {modal.editId&&<button onClick={function(){
                if(modal.paid){ setPwDeleteModal(modal.editId); }
                else{ deletePay(modal.editId); }
              }} style={{padding:"11px 14px",borderRadius:11,background:"#FDE8E8",color:"#E85B5B",fontWeight:800,fontSize:13}}>Eliminar</button>}
              <button onClick={function(){ setModal(null); }} style={{flex:1,padding:"11px 0",borderRadius:11,background:"#F4F6FB",color:"#4A5568",fontWeight:800,fontSize:14}}>Cancelar</button>
              <button onClick={savePayment} disabled={saving||uploading} style={{flex:2,padding:"11px 0",borderRadius:11,background:GREEN.main,color:"#fff",fontWeight:900,fontSize:14,display:"flex",alignItems:"center",justifyContent:"center",gap:8}}>
                {saving?<Spinner color="#fff"/>:(modal.editId?"Guardar":"Agregar")}
              </button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// ── Registro de Pagos (con contrasena) ──
function RegistroPagos() {
  var [unlocked,setUnlocked]=useState(false), [pw,setPw]=useState(""), [pwErr,setPwErr]=useState(false);
  var [tab,setTab]=useState("prov"), [data,setData]=useState([]), [loading,setLoading]=useState(false);
  var [sups,setSups]=useState([]), [filterSup,setFilterSup]=useState("Todos"), [filterStatus,setFilterStatus]=useState("Todos");

  function tryUnlock() {
    if(pw==="Arte2000"){ setUnlocked(true); loadTab("prov"); }
    else{ setPwErr(true); setTimeout(function(){ setPwErr(false); },1500); }
  }

  async function loadTab(t) {
    setLoading(true);
    try {
      if(t==="prov"){
        var [pays,supList]=await Promise.all([db.get("prov_payments","order=month_key.desc,day.desc"),db.get("prov_suppliers","order=name.asc")]);
        setData(pays); setSups(supList);
      } else {
        setData(await db.get("afip_payments","order=month_key.asc,day.asc")); setSups([]);
      }
    } catch(e){ console.error(e); }
    setLoading(false);
  }

  function switchTab(t){ setTab(t); setFilterSup("Todos"); setFilterStatus("Todos"); loadTab(t); }

  function fmtDate(mk,day){ var p=mk.split("-").map(Number); return String(day).padStart(2,"0")+"/"+String(p[1]+1).padStart(2,"0")+"/"+p[0]; }

  if(!unlocked) return (
    <div style={{background:"#fff",borderRadius:16,padding:40,boxShadow:"0 1px 3px #0001",textAlign:"center",maxWidth:340,margin:"0 auto"}}>
      <div style={{fontSize:36,marginBottom:14}}>&#128274;</div>
      <h2 style={{fontFamily:"'Fraunces',serif",fontWeight:800,fontSize:20,color:"#1A1D2E",marginBottom:6}}>Acceso restringido</h2>
      <p style={{fontSize:13,color:"#8892A4",fontWeight:600,marginBottom:20}}>Ingresa la contrasena para ver el registro.</p>
      <input type="password" value={pw} onChange={function(e){setPw(e.target.value);}} onKeyDown={function(e){if(e.key==="Enter")tryUnlock();}}
        placeholder="Contrasena" style={{width:"100%",padding:"12px 16px",borderRadius:11,border:"1.5px solid "+(pwErr?"#E85B5B":"#E5E9F0"),fontSize:15,fontWeight:600,marginBottom:pwErr?6:14,textAlign:"center"}}/>
      {pwErr&&<p style={{fontSize:12,color:"#E85B5B",fontWeight:700,marginBottom:10}}>Contrasena incorrecta</p>}
      <button onClick={tryUnlock} style={{width:"100%",padding:"13px 0",borderRadius:11,background:BLUE.main,color:"#fff",fontWeight:900,fontSize:15}}>Ingresar</button>
    </div>
  );

  var filtered=data.filter(function(p){
    if(filterStatus==="Pagado"&&!p.paid) return false;
    if(filterStatus==="Pendiente"&&p.paid) return false;
    if(tab==="prov"&&filterSup!=="Todos"&&p.supplier!==filterSup) return false;
    return true;
  });

  return (
    <div className="fade-in">
      <div style={{display:"flex",gap:8,marginBottom:14}}>
        {[["prov","Proveedores"],["afip","Impuestos"]].map(function(it){
          var t=it[0],l=it[1];
          return <button key={t} onClick={function(){ switchTab(t); }} style={{padding:"9px 18px",borderRadius:10,fontSize:13,fontWeight:700,background:tab===t?BLUE.main:"#fff",color:tab===t?"#fff":"#4A5568",boxShadow:tab===t?"0 4px 12px "+BLUE.main+"30":"0 1px 3px #0001"}}>{l}</button>;
        })}
      </div>
      <div style={{background:"#fff",borderRadius:14,padding:22,boxShadow:"0 1px 3px #0001"}}>
        <h2 style={{fontFamily:"'Fraunces',serif",fontWeight:800,fontSize:17,color:"#1A1D2E",marginBottom:16}}>Registros — {tab==="prov"?"Proveedores":"Impuestos"}</h2>
        <div style={{display:"flex",gap:10,marginBottom:16,flexWrap:"wrap"}}>
          {tab==="prov"&&(
            <select value={filterSup} onChange={function(e){setFilterSup(e.target.value);}} style={{padding:"8px 12px",borderRadius:9,border:"1.5px solid #E5E9F0",fontSize:13,fontWeight:600,background:"#fff"}}>
              <option value="Todos">Todos los proveedores</option>
              {sups.map(function(s){ return <option key={s.id} value={s.name}>{s.name}</option>; })}
            </select>
          )}
          <select value={filterStatus} onChange={function(e){setFilterStatus(e.target.value);}} style={{padding:"8px 12px",borderRadius:9,border:"1.5px solid #E5E9F0",fontSize:13,fontWeight:600,background:"#fff"}}>
            <option value="Todos">Todos</option>
            <option value="Pagado">Pagado</option>
            <option value="Pendiente">Pendiente</option>
          </select>
          <span style={{fontSize:13,color:"#8892A4",fontWeight:600,alignSelf:"center"}}>{filtered.length} resultado{filtered.length!==1?"s":""}</span>
        </div>
        {loading?<div style={{display:"flex",justifyContent:"center",padding:40}}><Spinner color={BLUE.main}/></div>:
          filtered.length===0?<p style={{fontSize:14,color:"#8892A4",textAlign:"center",padding:"30px 0"}}>Sin resultados.</p>:(
            <div style={{display:"flex",flexDirection:"column",gap:7}}>
              {filtered.map(function(p){
                var cat=tab==="afip"?getCat(p.category):null;
                return (
                  <div key={p.id} style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"11px 14px",borderRadius:11,background:p.paid?"#F9FAFB":(cat?cat.light:GREEN.light)}}>
                    <div style={{flex:1,minWidth:0}}>
                      <p style={{fontWeight:700,fontSize:14,color:"#1A1D2E",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{tab==="prov"?p.supplier:p.name}</p>
                      <p style={{fontSize:12,color:"#8892A4",fontWeight:600}}>{fmtDate(p.month_key,p.day)}{p.metodo_pago?" · "+p.metodo_pago:""}</p>
                    </div>
                    <div style={{display:"flex",alignItems:"center",gap:10,flexShrink:0,marginLeft:12}}>
                      <span style={{fontSize:14,fontWeight:900,color:"#1A1D2E"}}>{fmt(p.amount)}</span>
                      <span style={{fontSize:11,fontWeight:700,padding:"3px 9px",borderRadius:20,background:p.paid?"#E4F9ED":"#FEF3D7",color:p.paid?"#27AE60":"#E8A838",whiteSpace:"nowrap"}}>{p.paid?"Pagado":"Pendiente"}</span>
                    </div>
                  </div>
                );
              })}
            </div>
          )
        }
      </div>
    </div>
  );
}

// ── Main App ──
function App() {
  var [loggedIn,setLoggedIn]=useState(function(){ return sessionStorage.getItem("poster-auth")==="1"; });
  var [showWelcome,setShowWelcome]=useState(false);
  var [mainTab,setMainTab]=useState("prov");

  if(!loggedIn) return <LoginScreen onLogin={function(){ sessionStorage.setItem("poster-auth","1"); setLoggedIn(true); setShowWelcome(true); }}/>;

  return (
    <div style={{minHeight:"100vh",background:"#F4F6FB"}}>
      {showWelcome&&<WelcomePopup onClose={function(){ setShowWelcome(false); }}/>}
      <div style={{maxWidth:1100,margin:"0 auto",padding:"24px 16px"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20,flexWrap:"wrap",gap:12}}>
          <PosterLogo width={150}/>
          <div style={{display:"flex",gap:2,background:"#fff",borderRadius:14,padding:4,boxShadow:"0 1px 3px #0001"}}>
            <button onClick={function(){ setMainTab("prov"); }} style={{padding:"10px 20px",borderRadius:11,fontSize:13,fontWeight:800,background:mainTab==="prov"?GREEN.main:"transparent",color:mainTab==="prov"?"#fff":"#8892A4",transition:"all 0.15s"}}>
              Proveedores
            </button>
            <button onClick={function(){ setMainTab("afip"); }} style={{padding:"10px 20px",borderRadius:11,fontSize:13,fontWeight:800,background:mainTab==="afip"?BLUE.main:"transparent",color:mainTab==="afip"?"#fff":"#8892A4",transition:"all 0.15s"}}>
              Impuestos
            </button>
            <button onClick={function(){ setMainTab("registro"); }} style={{padding:"10px 20px",borderRadius:11,fontSize:13,fontWeight:800,background:mainTab==="registro"?"#2C3E50":"transparent",color:mainTab==="registro"?"#fff":"#8892A4",transition:"all 0.15s"}}>
              Registros
            </button>
          </div>
        </div>
        <div style={{height:3,borderRadius:4,background:mainTab==="prov"?GREEN.main:mainTab==="afip"?BLUE.main:"#2C3E50",marginBottom:18,transition:"background 0.2s"}}/>
        {mainTab==="prov"&&<ProveedoresCalendar/>}
        {mainTab==="afip"&&<AfipCalendar/>}
        {mainTab==="registro"&&<RegistroPagos/>}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
